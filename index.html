.hero {

.hero-bg {

}

/* GRADIENT RENFORCÉ POUR LA LISIBILITÉ */
.hero-gradient {

.hero-content {

}

.readable-text {
    color: var(--soft-gold) !important;
    /* L'ombre portée est la clé ici pour détacher le texte du fond flou/complexe */
    text-shadow: 0px 2px 4px rgba(0, 0, 0, 0.5), 0px 0px 10px rgba(0, 0, 0, 0.2);
    letter-spacing: 2px;
    font-weight: 500;
}

h1 {

}

.ampersand {
    font-size: 2.2rem;
    color: var(--white);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    display: block;
    margin: 5px 0;
    text-shadow: 0px 2px 4px rgba(0,0,0,0.5);
}

.hero-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 8vw, 2.8rem);
    color: var(--white);
    margin-top: 15px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.7);
}

.location-text {
    margin-top: 15px;
    font-size: 1rem;
    color: var(--soft-gold);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8); /* Très important pour le bas de l'image */
}

/* --- SECTIONS --- */
.wrap { max-width: 750px; margin: 0 auto; padding: 60px 20px; }

.card { 
    background: var(--white); 
    border-radius: 30px; 
    overflow: hidden; 
    box-shadow: 0 15px 45px rgba(214, 209, 240, 0.4); 
    margin-bottom: 50px; 
    border: 1px solid rgba(197, 163, 103, 0.1); 
}

.event { 
    display: grid; 
    grid-template-columns: 90px 2px 1fr; 
    gap: 25px; 
    padding: 30px; 
    border-bottom: 1px solid #f8f8f8; 
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 500px) {
  .hero { height: 70vh; }
  .event { grid-template-columns: 75px 2px 1fr; padding: 20px; }
}
</style>
