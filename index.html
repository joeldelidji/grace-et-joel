<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariage Grâce & Joel – 4 Juillet 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold-dark:   #A6894B; /* Or plus sombre pour la lisibilité */
  --text-main:   #333333; /* Presque noir pour un contraste maximal */
  --rose-soft:   #E8C5C5;
  --cream-bg:    #F9F6F1;
}

body { font-family: 'Jost', sans-serif; background: var(--cream-bg); color: var(--text-main); }

/* --- HERO SECTION --- */
.hero {
  position: relative;
  width: 100%;
  height: 85vh;
  display: flex;
  align-items: flex-start; /* Aligne le texte vers le haut */
  justify-content: center;
  overflow: hidden;
  padding-top: 50px; /* Décale le texte du haut de l'écran */
}

.hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('DSCF3391.JPG');
    background-size: cover;
    background-position: center 20%;
    z-index: -1;
}

/* Voile léger pour faire ressortir le texte sans cacher la photo */
.hero-overlay {
    position: absolute;
    top: 40px;
    background: rgba(255, 255, 255, 0.6); 
    backdrop-filter: blur(5px); /* Effet de verre dépoli moderne */
    padding: 30px 40px;
    border-radius: 20px;
    z-index: 1;
    text-align: center;
    max-width: 90%;
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.hero-intro {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--gold-dark);
    letter-spacing: 2px;
    margin-bottom: 5px;
}

.hero-invite {
    letter-spacing: 3px;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-main);
    text-transform: uppercase;
    margin-bottom: 20px;
}

h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 10vw, 3.8rem);
    color: var(--text-main);
    font-weight: 400;
    line-height: 1;
}

.ampersand {
    font-size: 1.8rem;
    color: var(--gold-dark);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    display: inline-block;
    margin: 0 10px;
}

.hero-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    color: var(--gold-dark);
    margin-top: 15px;
    border-top: 1px solid rgba(166, 137, 75, 0.3);
    padding-top: 10px;
}

.hero-loc {
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-main);
    margin-top: 10px;
    opacity: 0.8;
}

/* --- RESTE DU SITE (ESPACEMENTS) --- */
.wrap { max-width: 700px; margin: 0 auto; padding: 80px 20px; }
.card { background: #fff; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 30px; margin-top: 40px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.hero-overlay { animation: fadeUp 1.2s ease-out; }

</style>
</head>
<body>

<div class="hero">
    <div class="hero-bg"></div>
    
    <div class="hero-overlay">
        <p class="hero-intro">L'union de deux âmes</p>
        <p class="hero-invite">Nous avons l'honneur de vous inviter</p>
        <div class="names">
            <h1>Grâce <span class="ampersand">&</span> Joël</h1>
        </div>
        <div class="hero-date">4 Juillet 2026</div>
        <p class="hero-loc">Bagneux • Palaiseau</p>
    </div>
</div>

<div class="wrap">
    <h2 style="text-align: center; font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 2.2rem;">Le Programme</h2>
    
    <div class="card">
        <p style="text-align: center; font-style: italic; color: #777;">La suite de votre magnifique journée...</p>
    </div>
</div>

</body>
</html>
