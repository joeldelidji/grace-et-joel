<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariage Grâce & Joel – 4 Juillet 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --soft-gold:   #C5A367; 
  --powder-rose: #E8C5C5; 
  --lavender:    #D6D1F0; 
  --cream-bg:    #F9F6F1;
  --text-dark:   #423E3B;
  --white:       #FFFFFF;
}

html { scroll-behavior: smooth; }
body { font-family: 'Jost', sans-serif; background: var(--cream-bg); color: var(--text-dark); overflow-x: hidden; line-height: 1.4; }

/* --- HERO --- */
.hero {
  position: relative; width: 100%; height: 85vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden;
  color: var(--white); /* Texte en blanc pour contraster sur la photo */
}

/* BLOC PHOTO DE FOND RÉINTÉGRÉ */
.hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('DSCF3391.JPG');
    background-size: cover;
    background-position: center 20%; 
    z-index: -1;
}

/* Gradiant subtil pour la lisibilité et la transition */
.hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(255,255,255,0) 40%, var(--cream-bg) 100%);
    z-index: 0;
}

.hero-content {
  position: relative; z-index: 2;
  text-align: center; padding: 0 24px;
  animation: fadeUp 1.5s ease-out both;
}

h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 4rem;
    color: var(--white); /* Noms en blanc */
    font-weight: 400;
    margin: 5px 0;
    line-height: 1;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3); /* Ombre pour la lisibilité */
}

.ampersand {
    font-size: 2.2rem;
    color: var(--soft-gold); /* L'esperluette reste dorée */
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    display: block;
    margin: 5px 0;
}

.hero-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    color: var(--white); /* Date en blanc */
    margin-top: 20px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

/* --- SECTIONS --- */
.wrap { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
.section-eye { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--soft-gold); margin-bottom: 10px; text-align: center; font-weight: 500; }
.section-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--text-dark); margin-bottom: 20px; text-align: center; }

.divider { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; justify-content: center; }
.line { width: 50px; height: 1px; background: var(--soft-gold); opacity: 0.4; }

/* --- CARTE PROGRAMME --- */
.card { background: var(--white); border-radius: 30px; overflow: hidden; box-shadow: 0 15px 45px rgba(214, 209, 240, 0.3); margin-bottom: 30px; border: 1px solid rgba(197, 163, 103, 0.1); }
.card-head { 
    background: linear-gradient(135deg, var(--cream-bg) 0%, #f3f0ff 100%); 
    padding: 25px 20px; 
    text-align: center; 
}
.card-head h2 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; color: var(--text-dark); }

.event { display: grid; grid-template-columns: 80px 2px 1fr; gap: 20px; padding: 20px; border-bottom: 1px solid #f5f5f5; }
.event:last-child { border-bottom: none; }
.time { text-align: right; font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--soft-gold); font-weight: 500; }
.line-v { background: var(--lavender); width: 2px; height: 100%; position: relative; }
.line-v::after { content: ''; position: absolute; top: 6px; left: -4px; width: 10px; height: 10px; background: var(--powder-rose); border-radius: 50%; }

.event-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-bottom: 3px; color: var(--text-dark); }
